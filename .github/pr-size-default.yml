# Org-wide default: only oversized PRs get labeled. Everything else stays unlabeled.

# To exclude certain files from the line count, uncomment and edit:
exclude_files:
   - "*.lock"
   - "package-lock.json"
#   - "*.min.js"

label_configs:
  - size: xl
    diff: 2200
    labels: ["size/invalid", "splitting-wanted"]
